<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Sambung Kata Bot</title>

    <style>
      
      /* ================= BASE & LAYOUT ================= */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 12px;
        background: rgba(18, 18, 18, 0.6); /* Warna hitam transparan */
        backdrop-filter: blur(10px); /* Efek kaca buram */
        -webkit-backdrop-filter: blur(10px);
        color: #e0e0e0;
        border: none;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        /* -webkit-app-region: drag; */
        overflow-x: hidden;
        box-shadow: none !important;
      }

      h2 {
        font-size: 16px;
        margin: 0 0 8px 0;
      }

      input,
      #list,
      button,
      #suffixFilters {
        -webkit-app-region: no-drag;
      }

      .main-content {
        flex: 1;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #666;
      }
      /* ================= INPUT GROUP & WRAPPER ================= */
      .input-group {
        margin-bottom: 8px;
        width: 100%;
      }
      
      /* Pindahkan semua gaya 'kotak' input aslimu ke sini */
      .input-wrapper {
        display: flex;
        align-items: center;
        width: 100%;
        background: #1e1e1e; /* Warna background asli kamu */
        border: 1px solid #333; /* Border asli kamu */
        border-radius: 6px;
        transition: all 0.2s ease;
        box-sizing: border-box;
      }
      
      /* Pindahkan efek :focus ke :focus-within (saat input diklik) */
      .input-wrapper:focus-within {
        border-color: #7b2cbf;
        box-shadow: 0 0 5px rgba(123, 44, 191, 0.4);
      }
      
      /* ================= INPUT ASLI (DI DALAM WRAPPER) ================= */
      .input-wrapper input {
        flex: 1; /* Biar input ambil semua ruang sisa */
        padding: 8px 10px;
        font-size: 14px;
        background: transparent; /* PENTING: Supaya warna wrapper yang kelihatan */
        color: white;
        border: none; /* Hapus border agar tidak double */
        outline: none;
        width: 100%;
      }
      
      /* ================= TOMBOL SILANG (✕) ================= */
      .clear-icon {
        background: none;
        border: none;
        color: #666; /* Warna abu-abu gelap agar tidak mencolok */
        cursor: pointer;
        font-size: 16px;
        padding-right: 10px; /* Jarak dari tepi kanan */
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s;
        user-select: none;
      }
      
      .clear-icon:hover {
        color: #ff4d4d; /* Merah saat di-hover */
      }
      
      /* ================= BUTTONS (NEON OUTLINE PRO) ================= */
      button {
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 800; /* Font sangat tebal agar jelas */
        cursor: pointer;
        background: transparent;
        color: #999; /* Warna abu-abu redup saat diam */
        border: 1px solid #333; /* Garis tepi redup saat diam */
        border-radius: 4px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); /* Animasi mulus tapi cepat */
        text-transform: uppercase;
        letter-spacing: 0.8px; /* Jarak antar huruf agar tegas */
        box-shadow: none; /* Bersih saat diam */
      }

      /* Efek Tekan Tombol */
      button:active {
        transform: scale(0.95);
      }

      /* ================= NEON COLOR RULES ================= */

      /* Tombol Skakmat (Ungu Menyala) */
      button.skakmat-mode {
        border-color: rgba(188, 19, 254, 0.3); /* Garis tepi ungu redup */
        color: rgba(188, 19, 254, 0.8); /* Teks ungu redup */
      }
      button.skakmat-mode:hover {
        border-color: #bc13fe;
        color: #fff;
        background: rgba(188, 19, 254, 0.15); /* Latar belakang ungu tipis */
        /* Efek Glow Ganda: Teks dan Kotak */
        text-shadow:
          0 0 5px rgba(188, 19, 254, 1),
          0 0 10px rgba(188, 19, 254, 0.8);
        box-shadow:
          0 0 8px rgba(188, 19, 254, 0.6),
          inset 0 0 4px rgba(188, 19, 254, 0.3);
      }

      /* Tombol Hide (Hijau Menyala) */
      #toggleHideBtn {
        border-color: rgba(0, 255, 102, 0.2);
        color: rgba(0, 255, 102, 0.7);
      }
      #toggleHideBtn:hover {
        border-color: #00ff66;
        color: #fff;
        background: rgba(0, 255, 102, 0.15);
        text-shadow:
          0 0 5px #00ff66,
          0 0 10px #00ff66;
        box-shadow:
          0 0 8px rgba(0, 255, 102, 0.6),
          inset 0 0 4px rgba(0, 255, 102, 0.3);
      }

      /* Tombol Used (Biru Menyala) */
      #toggleUsedOnlyBtn {
        border-color: rgba(0, 212, 255, 0.2);
        color: rgba(0, 212, 255, 0.7);
      }
      #toggleUsedOnlyBtn:hover {
        border-color: #00d4ff;
        color: #fff;
        background: rgba(0, 212, 255, 0.15);
        text-shadow:
          0 0 5px #00d4ff,
          0 0 10px #00d4ff;
        box-shadow:
          0 0 8px rgba(0, 212, 255, 0.6),
          inset 0 0 4px rgba(0, 212, 255, 0.3);
      }

      /* Tombol Reset & Engine (Merah Redup/Menyala) */
      #resetUsedBtn,
      button[onclick="switchEngine()"] {
        border-color: rgba(255, 68, 68, 0.2);
        color: rgba(255, 68, 68, 0.7);
      }
      #resetUsedBtn:hover,
      button[onclick="switchEngine()"]:hover {
        border-color: #ff4444;
        color: #fff;
        background: rgba(255, 68, 68, 0.15);
        text-shadow:
          0 0 5px #ff4444,
          0 0 10px #ff4444;
        box-shadow:
          0 0 8px rgba(255, 68, 68, 0.6),
          inset 0 0 4px rgba(255, 68, 68, 0.3);
      }

      /* ================= UTILITY BUTTONS ================= */
      #close-btn {
        border: none;
        color: #555;
        background: transparent;
      }
      #close-btn:hover {
        color: #ff4444;
        background: transparent;
        text-shadow: 0 0 8px #ff4444;
        box-shadow: none;
        transform: scale(1.1);
      }

      /* #clearBtn {
        border-color: #333;
        color: #777;
        border-radius: 4px;
        padding: 4px 10px;
      }
      #clearBtn:hover {
        border-color: #fff;
        color: #fff;
        background: transparent;
        box-shadow: 0 0 6px #fff;
      } */
      /* ================= LIST & ITEMS ================= */
      #list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .item {
        background: #1e1e1e;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
        transition: all 0.1s;

        /* TAMBAHAN BARU */
        text-transform: uppercase;
        font-family: "Consolas", "Courier New", monospace; /* Font ala hacker */
        font-size: 14px; /* Sedikit dibesarkan karena monospace lebih kecil */
        letter-spacing: 0.5px;
        color: #e4e4e4; /* Diberi warna hijau neon agar makin garang */
      }
      .item:hover {
        background: #252525;
        border-color: #444;
      }
      .item.used {
        color: #666;
        text-decoration: line-through;
        background: #151515;
      }
      /* Gaya Font Pro Player untuk Kata */
      .item span:first-child {
        text-transform: uppercase; /* Huruf BESAR SEMUA */
        letter-spacing: 1px; /* Jarak antar huruf agar tegas */
        font-weight: 600;
        font-family: "Consolas", "Courier New", monospace; /* Font ala hacker */
      }

      /* Efek Highlight Menyala untuk Akhiran Mematikan */
      .deadly-highlight {
        color: #ff4444; /* Warna merah neon */
        text-shadow: 0 0 8px rgba(255, 68, 68, 0.6); /* Efek berpendar (glow) */
        font-weight: 800;
      }

      /* Redupkan highlight jika kata sudah dipakai (used) */
      .item.used .deadly-highlight {
        color: #aa5555;
        text-shadow: none;
      }
      .delete-btn {
        padding: 3px 6px !important;
        font-size: 13px !important;
      }

      /* ================= INDICATORS & TEXT ================= */
      .best {
        color: #00e676;
        font-weight: bold;
        font-size: 13px;
        margin-top: 8px;
        background: rgba(0, 230, 118, 0.1);
        padding: 8px;
        border-radius: 6px;
        border: 1px solid rgba(0, 230, 118, 0.2);
        display: none;
      }
      #counter {
        font-weight: 600;
        margin-top: 4px;
        font-size: 12px;
      }
      .counter-green {
        color: #00e676;
      }
      .counter-yellow {
        color: #ffea00;
      }
      .counter-red {
        color: #ff5252;
      }
      #addWordMsg.success {
        color: #00e676;
        font-size: 12px;
      }
      #addWordMsg.error {
        color: #ff5252;
        font-size: 12px;
      }

      /* ================= PAGINATION ================= */
      #pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        background: #181818;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #222;
      }
      #pagination button {
        background: #2b2b2b;
        padding: 4px 10px;
        font-size: 12px;
        border: 1px solid #333;
      }
      #pagination button:hover:not(:disabled) {
        background: #3a3a3a;
      }
      #pageInfo {
        font-size: 12px;
        font-weight: bold;
        color: #bbb;
      }

      /* ================= CHIPS (SKAKMAT FILTERS) ================= */
      #suffixFilters {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
      }
      .suffix-chip {
        background: #1e1e1e;
        border: 1px solid #333;
        color: #aaa;
        padding: 4px 8px;
        font-size: 11px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.1s;
      }
      .suffix-chip:hover:not(:disabled) {
        background: #2a2a2a;
        color: #fff;
      }
      .suffix-chip.active {
        background: linear-gradient(135deg, #7b2cbf, #9d4edd);
        color: white;
        border-color: transparent;
        font-weight: bold;
      }
      .suffix-chip:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      
           /* ================= FOOTER ================= */
      .footer {
        padding: 6px 12px; /* Padding kiri-kanan dilebarkan sedikit */
        background: #151515;
        border-top: 1px solid #222;
        border-bottom: 1px solid #555555;
        font-size: 11px;
        color: #888;
        border-radius: 6px;
        margin-top: auto;
        margin-bottom: auto;
        
        /* TAMBAHAN BARU: Ubah jadi Flexbox agar sejajar kiri-kanan */
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* ================= CUSTOM RESIZE HANDLE ================= */
      #resize-handle {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 18px; /* Dilebarkan sedikit agar garisnya lebih tegas */
        height: 18px;
        cursor: nwse-resize;
        z-index: 9999;
        -webkit-app-region: no-drag;
        border-bottom-right-radius: 6px;
        opacity: 0.6; /* Agak redup saat diam */
        transition: all 0.2s ease;
        
        /* Motif 3 Garis Diagonal (Grip) ala UI Hacker/Gaming */
        background-image: linear-gradient(
          135deg, 
          transparent 40%, 
          
          rgba(136, 136, 136, 0.4) 40%, 
          rgba(136, 136, 136, 0.4) 50%, 
          
          transparent 50%, 
          transparent 65%, 
          
          rgba(136, 136, 136, 0.7) 65%, 
          rgba(136, 136, 136, 0.7) 75%, 
          
          transparent 75%, 
          transparent 90%, 
          
          #888888 90%, 
          #888888 100%
        );
      }

      #resize-handle:hover {
        opacity: 1;
        /* Menyala putih terang saat ditarik */
        filter: drop-shadow(-2px -2px 4px rgba(255, 255, 255, 0.4));
        transform: scale(1.1); 
        transform-origin: bottom right;
      }
      #addWordBtn:hover {
        background: #00e676;
        color: rgba(255, 255, 255, 0.89);
        box-shadow: 0 0 8px #00e676;

      }  
      /* Tombol Sort (Oranye Menyala) */
      #sortBtn {
        border-color: rgba(255, 165, 0, 0.2);
        color: rgba(255, 165, 0, 0.7);
      }
      #sortBtn:hover {
        border-color: #ffa500;
        color: #fff;
        background: rgba(255, 165, 0, 0.15);
        text-shadow: 0 0 5px #ffa500, 0 0 10px #ffa500;
        box-shadow: 0 0 8px rgba(255, 165, 0, 0.6), inset 0 0 4px rgba(255, 165, 0, 0.3);
      }
    </style>
  </head>

  <body>
    
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: 'Segoe UI', sans-serif;">
      <div id="login-form" style="display: flex; flex-direction: column; align-items: center;">
        <h2 style="margin-bottom: 20px; color: #ff4444; letter-spacing: 2px;">☠️ SKAKMAT ACCESS</h2>
        <input type="text" id="license-key-input" placeholder="Masukkan License Key..." style="padding: 12px; width: 280px; border-radius: 8px; border: 1px solid #444; margin-bottom: 12px; background: #1a1a1a; color: white; text-align: center; outline: none;">
        <button id="submit-key-btn" style="padding: 12px; background: #ff4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 280px; transition: 0.3s;">AKTIVASI</button>
      </div>
      <div id="welcome-back" style="display: none; flex-direction: column; align-items: center; text-align: center; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
        <div style="font-size: 40px; margin-bottom: 10px;">👋</div>
        <h3 style="margin: 0; color: #fff;">Selamat Datang Kembali!</h3>
        <p id="display-saved-key" style="color: #888; font-size: 13px; margin: 10px 0 20px 0; font-family: monospace; background: #000; padding: 5px 10px; border-radius: 5px;"></p>
        <button id="continue-btn" style="padding: 12px 30px; background: #00c853; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 200px; margin-bottom: 10px;">LANJUTKAN</button>
        <a id="switch-key-btn" style="color: #ff4444; font-size: 12px; cursor: pointer; text-decoration: underline;">Ganti Key / Logout</a>
      </div>
      <p id="login-msg" style="margin-top: 20px; font-size: 13px; color: #ffbc00; font-weight: 500;"></p>
    </div>

    <div class="main-content">
      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          position: relative;
          margin-bottom: 15px;
          -webkit-app-region: drag;
          cursor: grab;
        "
      >
        <h2 style="margin: 0">🔥 Helper Sambung Kata 🔥</h2>

        <div
          style="
            position: absolute;
            right: 0;
            display: flex;
            gap: 5px;
            -webkit-app-region: no-drag;
          "
        >
          <button
            id="collapse-btn"
            style="
              cursor: pointer;
              background: #333;
              color: white;
              border: none;
              padding: 2px 8px;
              border-radius: 4px;
            "
          >
            -
          </button>
          <button
            id="close-btn"
            style="
              cursor: pointer;
              background: #c0392b;
              color: white;
              border: none;
              padding: 2px 8px;
              border-radius: 4px;
            "
          >
            ✕
          </button>
        </div>
      </div>
      
      <div class="input-group">
        <div class="input-wrapper">
          <input id="prefix" placeholder="Ketik prefix..." autofocus />
          <button id="clearBtn" class="clear-icon">✕</button>
        </div>
      </div>
      
      <div id="normalSuffixContainer" class="input-group">
        <div class="input-wrapper">
          <input id="normalSuffixInput" placeholder="🎯 Target akhiran (opsional)..." />
          <button id="clearNormalSuffixBtn" class="clear-icon">✕</button>
        </div>
      </div>

<hr style="margin: 10px 0; opacity: 0.3" />
<div style="display: flex; gap: 5px; margin: 5px 0">
  <button id="modeBtn">🟢 NORMAL</button>
  <button id="sortBtn">↕️ Sort: Def</button>
  <button id="toggleHideBtn">👁️ Hide: OFF</button>
  <button id="toggleUsedOnlyBtn">♻️ Used: OFF</button>
  <button onclick="switchEngine()" hidden>🚀 Engine</button>
  <button id="resetUsedBtn" hidden>🗑️ Reset</button>
</div>

<p class="best" id="best"></p>
<p id="counter"></p>
<div id="suffixFilters" style="display: none"></div>
<div id="list"></div>      
<div id="pagination" style="display: none">
  <button id="prevBtn">⬅️ Prev</button>
  <span id="pageInfo">Hal 1 / 1</span>
  <button id="nextBtn">Next ➡️</button>
</div>
<hr style="margin: 15px 0; opacity: 0.3" />

<div class="input-group">
  <div class="input-wrapper">
    <input id="newWordInput" placeholder="Tambah kata baru..." />
    <button id="addWordBtn">Tambah</button>
  </div>
</div>
<p id="addWordMsg" style="margin-top: 5px"></p>
</div>

<div class="footer">
  <span id="engineIndicator"></span>
  
  <div style="font-size: 10px; color: #555; pointer-events: none; font-family: monospace; padding-right: 15px;">
    BAHERNOL-DEV-v1.1
  </div>
  
  <div id="resize-handle"></div>
</div>
    <script>
      const { ipcRenderer } = require("electron");

      const saved = localStorage.getItem("engine") || "engine1";

      function loadEngine(engineName) {
        if (engineName === "engine2") {
          require("./renderer2.js");
        } else {
          require("./renderer.js");
        }
      }

      loadEngine(saved);

      const indicator = document.getElementById("engineIndicator");
      indicator.innerText =
        saved === "engine2"
          ? "🧠 ENGINE 2 (words2.json)"
          : "🔥 ENGINE 1 (words.json)";

      window.switchEngine = function () {
        const current = localStorage.getItem("engine") || "engine1";
        const next = current === "engine1" ? "engine2" : "engine1";
        localStorage.setItem("engine", next);
        location.reload();
      };

      // ================= AUTO-SCALE WINDOW LOGIC =================
      function applyAutoScale() {
        const baseWidth = 400; // Lebar patokan (sesuai default di main.js kamu)
        const currentWidth = window.innerWidth;

        // Hitung rasio zoom. Jika lebar window 400, zoom = 1. Jika 600, zoom = 1.5, dst.
        const scaleFactor = currentWidth / baseWidth;

        // Terapkan zoom ke body
        document.body.style.zoom = scaleFactor;
      }

      // Jalankan saat aplikasi pertama kali dimuat
      applyAutoScale();

      // Jalankan setiap kali user menarik (resize) ujung window
      window.addEventListener("resize", applyAutoScale);
    </script>
    </div> 
  </body>
