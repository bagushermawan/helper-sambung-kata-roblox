<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<title>Sambung Kata Bot</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: white;
  -webkit-app-region: drag;
}

input, #list, button {
  -webkit-app-region: no-drag;
}

.item.used {
  color: #777;
  text-decoration: line-through;
  opacity: 0.6;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 18px;
}

button {
  padding: 0 20px;
  font-size: 18px;
  cursor: pointer;
  background: #ff4444;
  color: white;
  border: none;
  border-radius: 4px;
}

button:hover {
  background: #ff2222;
}

.best {
  color: #00ff88;
  font-weight: bold;
  margin-top: 15px;
}
#toggleHideBtn {
  background: #44aa44;
}
#counter {
  font-weight: bold;
  margin-top: 5px;
}

.counter-green {
  color: #00ff88;
}

.counter-yellow {
  color: #ffcc00;
}

.counter-red {
  color: #ff4444;
}
#addWordMsg.success {
  color: #00ff88;
}

#addWordMsg.error {
  color: #ff4444;
}
#close-btn {
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#close-btn:hover {
  color: red;
}
</style>
</head>

<body>

<div style="display:flex;justify-content: center; gap:5px;"><h2>🔥 Helper Sambung Kata 🔥</h2><button id="close-btn">✕</button></div>

<div style="display:flex; gap:5px;">
  <input id="prefix" placeholder="Ketik prefix..." autofocus />
  <button id="clearBtn">✕</button>
  <button id="toggleHideBtn">Hide: OFF</button>
  <button id="resetUsedBtn">Reset</button>
</div>

<p class="best" id="best"></p>
<p id="counter" margin-top:5px;"></p>
<div id="list"></div>

<hr style="margin:15px 0; opacity:0.3;">

<div style="display:flex; gap:5px;">
  <input id="newWordInput" placeholder="Tambah kata baru..." />
  <button id="addWordBtn">Tambah</button>
</div>

<p id="addWordMsg" style="margin-top:5px;"></p>

<script src="renderer.js"></script>

</body>
</html>
